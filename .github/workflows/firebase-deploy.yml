name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Build frontend
      - run: npm ci
      - run: npm run build
        env:
          VITE_CESIUM_ION_TOKEN: ${{ secrets.VITE_CESIUM_ION_TOKEN }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}

      # Build Cloud Functions
      - run: npm ci
        working-directory: functions
      - run: npm run build
        working-directory: functions

      # Write service account for firebase-tools CLI
      - name: Authenticate Firebase
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-sa.json

      # Deploy hosting
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live

      # Deploy Cloud Functions (the hosting action only deploys hosting)
      - name: Deploy Cloud Functions
        run: npx firebase-tools deploy --only functions --project trackerofthings
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
